<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Моей Любимке 💖</title>

<style>
body{
margin:0;
padding:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:'Comic Sans MS', cursive;
overflow:hidden;

background-size:cover;
background-position:center;
background-repeat:no-repeat;

transition: background-image 1s ease;
}

h1{
text-align:center;
font-size:3rem;
color:white;
text-shadow:2px 2px 10px black;
margin-bottom:50px;
max-width:900px;
animation: fadeIn 0.5s ease;
}

button{
font-size:1.5rem;
padding:15px 30px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#yes{
background:#ff6f91;
color:white;
}

#no{
background:#ff2e63;
color:white;
position:absolute;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<h1 id="question">Вай чонам, сегодня тоже вернулась посмотреть? 😄</h1>

<button id="yes">ДА</button>
<button id="no">НЕТ</button>

<script>

const body = document.body
const question = document.getElementById("question")
const yes = document.getElementById("yes")
const no = document.getElementById("no")

let step = 0

body.style.backgroundImage = "url('photo1.jpg')"

const questions = [

"Я рад что тебе понравилось ❤️ Нажми ДА и... ",

"Будешь ли ты улыбаться каждый день? 😄",

"Правильно 😄 со мной всегда будешь! Хочешь обниматься прямо сейчас? 🤗",

"Обняла бы меня прямо сейчас, чонам? 🤗",

"Про никах не забываем 😄💖 Ты счастлива быть моей?"

]

no.addEventListener("mouseenter", () => {

const x = Math.random() * (window.innerWidth - no.offsetWidth)
const y = Math.random() * (window.innerHeight - no.offsetHeight)

no.style.left = x + "px"
no.style.top = y + "px"

})

const audio = new Audio('music.mp3')
audio.loop = true

yes.addEventListener("click", () => {

if(audio.paused) audio.play()

if(step < questions.length){

question.textContent = questions[step]

/* первые 2 фото меньше */

if(step === 0 || step === 1){
body.style.backgroundSize = "contain"
}else{
body.style.backgroundSize = "cover"
}

step++

body.style.backgroundImage = "url('photo" + (step+1) + ".jpg')"

}else{

body.style.backgroundImage = "url('photo7.jpg')"

body.innerHTML = `
<h1>
Я тебя люблю, чони дилям ❤️<br><br>
И всегда буду стараться чтобы ты улыбалась.<br><br>
С 8 марта чонам 🌸
</h1>
`

}

})

</script>

</body>
</html>
